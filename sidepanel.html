<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duolingo AI Solver</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#58CC02"/>
          <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>Duo AI Solver</h1>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </header>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="panel hidden">
      <div class="field">
        <label for="apiKeyInput">OpenAI API Key</label>
        <div class="input-row">
          <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
          <button id="toggleKey" class="icon-btn small" title="Show/Hide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button id="saveKeyBtn" class="btn btn-primary btn-sm">Save Key</button>
      <p id="keyStatus" class="status-text"></p>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="panel">
      <div id="notOnDuolingo" class="message-box warning hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Navigate to <strong>duolingo.com</strong> first</span>
      </div>

      <div id="noApiKey" class="message-box info hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>Set your OpenAI API key in settings to get started</span>
      </div>

      <button id="solveBtn" class="btn btn-primary btn-lg" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Capture & Solve</span>
      </button>
      <p class="hint">or press <kbd>Alt</kbd> + <kbd>S</kbd> on any Duolingo page</p>

      <!-- Loading -->
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loadingText">Analyzing exercise...</p>
      </div>

      <!-- Result -->
      <div id="result" class="hidden">
        <div class="result-header">
          <h2>Answer</h2>
          <button id="copyBtn" class="icon-btn small" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div id="answerText" class="answer-text"></div>
      </div>

      <!-- Error -->
      <div id="error" class="message-box danger hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="errorText"></span>
      </div>
    </div>

    <footer>
      <span>Powered by GPT-5.4 Vision</span>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
